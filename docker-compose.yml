services:
  db:
    image: postgres:16-alpine
    container_name: thermosense-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thermosense}
      POSTGRES_USER: ${POSTGRES_USER:-thermosense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-thermosense}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - thermosense-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-thermosense} -d ${POSTGRES_DB:-thermosense}",
        ]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  thermosense-postgres-data:
