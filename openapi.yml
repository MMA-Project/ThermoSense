openapi: 3.0.3
info:
 title: API ThermalSense
 version: 1.0.0
tags:
 - name: Bâtiment
 - name: zone
 - name: capteur
 - name: measurement
 - name: actionneur
 - name: seuil d'alerte


# Composants réutilisables, sécurité et en-têtes
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: payload avec user_id
  responses:
    RateLimitExceeded:
      description: too many requests
      headers:
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
        X-RateLimit-Reset:
          schema:
            type: integer
  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Error message
      required:
        - code
        - message

    Building:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the building
        name:
          type: string
          description: Name of the building
        address:
          type: string
          description: Address of the building
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - name

    Zone:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the zone
        name:
          type: string
          description: Name of the zone
        buildingId:
          type: string
          description: ID of the building this zone belongs to
        description:
          type: string
          description: Description of the zone
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - name
        - buildingId

    Sensor:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the sensor
        name:
          type: string
          description: Name of the sensor
        zoneId:
          type: string
          description: ID of the zone this sensor belongs to
        type:
          type: string
          description: Type of sensor (e.g., temperature, humidity)
        status:
          type: string
          enum: [active, inactive]
          description: Status of the sensor
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - name
        - zoneId
        - type
        
    Actuator:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the actuator
        name:
          type: string
          description: Name of the actuator
        zoneId:
          type: string
          description: ID of the zone this actuator belongs to
        type:
          type: string
          description: Type of actuator (e.g., heater, cooler)
        status:
          type: string
          enum: [active, inactive]
          description: Status of the actuator
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - name
        - zoneId
        - type
    Measurement:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the measurement
        sensorId:
          type: string
          description: ID of the sensor that took the measurement
        value:
          type: number
          description: Measured value
        unit:
          type: string
          description: Unit of the measurement
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the measurement
      required:
        - sensorId
        - value
        - timestamp

    AlertThreshold:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the alert threshold
        zoneId:
          type: string
          description: ID of the zone this threshold applies to
        type:
          type: string
          description: Type of measurement this threshold is for
        minValue:
          type: number
          description: Minimum threshold value
        maxValue:
          type: number
          description: Maximum threshold value
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Last update timestamp
      required:
        - zoneId
        - type

    GenericRequest:
      type: object
      properties:
        eTag:
          type: string
          description: Entity tag for caching and conditional requests
        idempotencyKey:
          type: string
          description: Key to ensure idempotent requests
      description: Generic request model with optional eTag and idempotency key


# application globale du jwt
security:
  - bearerAuth: []


