       '500': {description: internal server error}
 /alert-threshold:
   get:
     tags: [seuil d'alerte]
     summary: récupère les seuils d'alerte filtrés
     parameters:
       - in: query
         name: zone
         schema: {type: string}
       - in: query
         name: type
         schema: {type: string}
     responses:
       '200': {description: OK}
       '400': {description: bad request}
	 '429': $ref: '#/components/responses/RateLimitExceeded'
       '500': {description: internal server error}
